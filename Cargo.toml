[package]
name = "rtpigate"
version = "0.1.0"
edition = "2024"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1.0.143"
tokio = { version = "1", features = ["full"] }
chrono = { version = "0.4.41", features = ["serde"] }
flexi_logger = { version = "0.31.2", features = ["colors"] }
log = "0.4.27"
toml = "0.9.5"
rtp-rs = "0.6.0"
ax25 = "0.3.0"
socket2 = "0.6.0"
tokio-util = "0.7.16"
axum = { version = "0.8.4", features = ["json"] }
tokio-stream = { version = "0.1.17", features = ["sync"] }
aprs-parser = { path = "vendor/aprs-parser-rs" }
