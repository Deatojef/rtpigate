###########################################
# The [station] section identifies the callsign and name of the station
###########################################
[station]
callsign = "N0CAL"

# used when igating is enabled
name = "Multi-frequency Rx Igate"

# set to true to enable debug level logging for troubleshooting
verbose = false


###########################################
# The [location] section specifies the RF-antenna location and altitude (in feet)
# of this station. These coordinates are the location beaconed to APRS-IS when
# source = "config".
###########################################
[location]

# Where the beacon position comes from:
#   "config" (default) - beacon the fixed lat/lon/alt below (RF-antenna location).
#                        A fixed igate that happens to have a GPS attached should
#                        use this; GPSD is then not consulted for beaconing.
#   "gpsd"             - beacon a live fix from gpsd (mobile/portable). The lat/lon/
#                        alt below then only serve as a bootstrap/fallback; with no
#                        fresh fix the position beacon is skipped. See [gpsd] below.
source = "config"

# station's RF-antenna location in decimal degrees
lat = 40.123
lon = -103.123

# station's altitude is in feet
alt = 1234


###########################################
# The [aprsis] section
###########################################
[aprsis]
# The passcode should be based off of this station's callsign (above).
passcode = "12345"
host = "noam.aprs2.net"
port = 14580

# Notes about overlay and symbol.  
#
# No overlay:
#     comment out the overlay statement when using an icon without an overlay (e.g. a truck, or car that wouldn't have an overlaid character).
# 
# symbol:
#     This should have two characters: 
#         1st - the symbol table identifier (i.e. / for the primary table, or \ for the alternate table).  However, note that the '\' must be escaped,
#             which ends up being the double backslash, "\\".  
#         2nd - the second character should be the symbol itself.  For example, the 'k' character denotes a Truck icon.
overlay = "R"
symbol = "\\&"

# if set to false, the no connection to APRS-IS will occur (regardless of the igating setting)
enabled = true

# if beaconing to the APRS-IS server is desired, set this to 'true'
beaconing = false

# set to 'true' to enable igating
igating = false

# how often to send telemetry and position beacons in seconds if igating or beaconing respectively
threshold = 600

# Positional precision encoded in position beacons via the APRS 1.2 !DAO! extension:
#   "human"  (default) - human-readable !Wxy! form, ~1.85 m. Broadly legible.
#   "base91"           - base-91 !wxy! form, ~0.2 m. Best for a well-surveyed fixed
#                        station or a high-precision receiver.
#   "off"              - no !DAO! token; base ddmm.hh position only (~18.5 m).
dao = "human"


###########################################
# The [stream] section selects the decoded-APRS multicast stream published by
# aprs-streamd (the base service that owns the ka9q-radio RTP audio, demodulates,
# and decodes once for all consumers). rtpigate no longer touches RTP audio — it
# subscribes to typed frames here. `group` and `port` must match aprs-streamd's
# emit destination.
###########################################
[stream]
group = "239.12.34.56"
port = 17014

# Optional: local interface (IP) to join the multicast group on for a multi-homed
# host. Omit to let the OS choose.
# interface = "192.168.1.20"

# Optional: enlarge the receive buffer (bytes) to ride out bursts. The producer
# applies no backpressure, so this is the consumer's only cushion against drops.
# recv_buffer_bytes = 4194304


###########################################
# The [gpsd] section configures the GPSD position source. It is only consulted
# when [location] source = "gpsd"; the whole section may be omitted to accept the
# defaults shown below.
###########################################
[gpsd]

# gpsd connection (defaults: localhost:2947)
host = "localhost"
port = 2947

# Movement-triggered beaconing. When moving, the station beacons as soon as its
# latitude or longitude changes by more than move_threshold_deg (degrees) since
# the last beacon, instead of only on the fixed `threshold` interval above.
move_threshold_deg = 0.0001

# Minimum seconds between movement-triggered beacons. Caps how often a fast mover
# can beacon so APRS-IS isn't flooded (default 30). The fixed `threshold` interval
# still guarantees a beacon + telemetry at least that often when a fresh fix exists.
min_beacon_secs = 30


###########################################
# The [satellite] section lists frequencies (MHz) considered satellite downlinks.
# Packets on these frequencies are gated only when digipeated or from a known satellite.
###########################################
[satellite]
frequencies = [145.825]

# NOTE: the demodulator's slicer bank (the old [decoder] section) now lives in
# aprs-streamd, which owns the decode. Its slicer count and gain ladder arrive on
# the wire with every frame and drive the dashboard's slicer waterfall
# automatically — there is nothing to configure here anymore.
